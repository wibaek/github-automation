name: SSH Compose Image Load Deploy

on:
  workflow_dispatch:
    inputs:
      image-reference:
        description: "배포할 image reference. 예: ghcr.io/owner/app@sha256:..."
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  ssh-compose-image-load-deploy:
    name: SSH Docker Compose Image Load Deploy
    uses: wibaek/github-automation/.github/workflows/ssh-compose-image-load-deploy.yaml@v1.0
    with:
      registry: "ghcr.io"
      image-reference: ${{ inputs.image-reference }}
      host: ${{ vars.HOST }}
      port: "22"
      user: ${{ vars.USER }}
      known-hosts: ${{ vars.KNOWN_HOSTS }}
      environment: "prod"
      environment-url: "https://example.com"
      project-directory: "/srv/my-app"
      compose-source-file: "docker-compose.yml"
      compose-file: "docker-compose.yml"
      env-file: ".env"
      local-image-name: "my-app"
      service: "app"
      healthcheck-url: "http://127.0.0.1:8000/health"
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      ENV_FILE_CONTENT: ${{ secrets.ENV_FILE_CONTENT }}
