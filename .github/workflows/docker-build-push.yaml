name: Docker Image Build/Push

on:
  workflow_call:
    inputs:
      # runs-on label 참고: https://docs.github.com/en/actions/reference/runners/github-hosted-runners
      runs-on:
        description: "실행할 러너 라벨"
        required: false
        type: string
        default: "ubuntu-latest"

      registry:
        description: "이미지를 푸시할 registry"
        required: false
        type: string
        default: "ghcr.io"

      registry-username:
        description: "registry 로그인 사용자명. 비워두면 github.actor 사용."
        required: false
        type: string
        default: ""

      ecr-login:
        description: "Amazon ECR에 OIDC role로 로그인할지 여부"
        required: false
        type: boolean
        default: false

      aws-region:
        description: "ECR 로그인에 사용할 AWS region"
        required: false
        type: string
        default: ""

      aws-role-to-assume:
        description: "ECR 로그인에 사용할 AWS IAM role ARN"
        required: false
        type: string
        default: ""

      aws-role-session-name:
        description: "AWS role session name"
        required: false
        type: string
        default: "GitHubActions"

      ecr-registries:
        description: "ECR login 대상 AWS account ID 목록. 비워두면 현재 account registry 사용."
        required: false
        type: string
        default: ""

      image-name:
        description: "빌드할 이미지 이름. 비워두면 registry/github.repository 사용."
        required: false
        type: string
        default: ""

      context:
        description: "Docker build context"
        required: false
        type: string
        default: "."

      dockerfile:
        description: "Dockerfile 경로"
        required: false
        type: string
        default: "./Dockerfile"

      platforms:
        description: "빌드할 플랫폼 목록. 예: linux/amd64 또는 linux/amd64,linux/arm64"
        required: false
        type: string
        default: "linux/amd64"

      target:
        description: "Dockerfile target stage. 비워두면 지정하지 않음."
        required: false
        type: string
        default: ""

      build-args:
        description: "docker/build-push-action에 전달할 build-args"
        required: false
        type: string
        default: ""

      build-secrets:
        description: "docker/build-push-action에 전달할 build secrets"
        required: false
        type: string
        default: ""

      tags:
        description: "docker/metadata-action tag 규칙"
        required: false
        type: string
        default: |
          type=ref,event=branch
          type=ref,event=tag
          type=sha

      labels:
        description: "docker/metadata-action에 추가로 전달할 labels"
        required: false
        type: string
        default: ""

      push:
        description: "이미지를 registry에 push할지 여부"
        required: false
        type: boolean
        default: true

      pull:
        description: "빌드 전에 항상 base image를 pull할지 여부"
        required: false
        type: boolean
        default: false

      no-cache:
        description: "Docker build cache를 사용하지 않을지 여부"
        required: false
        type: boolean
        default: false

      cache-type:
        description: "Buildx cache backend. gha, registry, none 중 하나"
        required: false
        type: string
        default: "gha"

      cache-scope:
        description: "type=gha cache scope"
        required: false
        type: string
        default: "docker-image"

      cache-mode:
        description: "cache export mode. min 또는 max"
        required: false
        type: string
        default: "max"

      registry-cache-ref:
        description: "type=registry cache ref. 예: ghcr.io/owner/repo:buildcache"
        required: false
        type: string
        default: ""

      setup-qemu:
        description: "QEMU를 설정할지 여부. multi-platform 빌드에 사용."
        required: false
        type: boolean
        default: false

      provenance:
        description: "Build provenance 생성 여부"
        required: false
        type: string
        default: "false"

      sbom:
        description: "SBOM 생성 여부"
        required: false
        type: string
        default: "false"

      timeout-minutes:
        description: "job 제한 시간"
        required: false
        type: number
        default: 45

    secrets:
      REGISTRY_PASSWORD:
        required: false

    outputs:
      image-tags:
        description: "생성된 Docker image tag 목록"
        value: ${{ jobs.build.outputs.image-tags }}
      image-primary-tag:
        description: "첫 번째 Docker image tag"
        value: ${{ jobs.build.outputs.image-primary-tag }}
      image-reference:
        description: "배포에 사용할 Docker image reference. push 후에는 digest reference를 우선 사용."
        value: ${{ jobs.build.outputs.image-reference }}
      image-digest:
        description: "빌드된 Docker image digest"
        value: ${{ jobs.build.outputs.image-digest }}
      image-metadata:
        description: "docker/build-push-action build metadata JSON"
        value: ${{ jobs.build.outputs.image-metadata }}

jobs:
  build:
    name: Docker Image Build/Push
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}

    outputs:
      image-tags: ${{ steps.meta.outputs.tags }}
      image-primary-tag: ${{ steps.image.outputs.primary-tag }}
      image-reference: ${{ steps.image.outputs.reference }}
      image-digest: ${{ steps.build.outputs.digest }}
      image-metadata: ${{ steps.build.outputs.metadata }}

    steps:
      - name: Docker 설정 검증
        env:
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          case "${{ inputs.cache-type }}" in
            gha|registry|none)
              ;;
            *)
              echo "지원하지 않는 cache-type: ${{ inputs.cache-type }}"
              exit 1
              ;;
          esac

          case "${{ inputs.cache-mode }}" in
            min|max)
              ;;
            *)
              echo "지원하지 않는 cache-mode: ${{ inputs.cache-mode }}"
              exit 1
              ;;
          esac

          if [ "${{ inputs.cache-type }}" = "registry" ] && [ -z "${{ inputs.registry-cache-ref }}" ]; then
            echo "cache-type이 registry이면 registry-cache-ref가 필요합니다."
            exit 1
          fi

          if [ "${{ inputs.ecr-login }}" = "true" ]; then
            if [ -z "${{ inputs.aws-region }}" ] || [ -z "${{ inputs.aws-role-to-assume }}" ]; then
              echo "ecr-login이 true이면 aws-region과 aws-role-to-assume이 필요합니다."
              exit 1
            fi
          fi

          if [ "${{ inputs.push }}" = "true" ] && [ "${{ inputs.registry }}" != "ghcr.io" ] && [ -z "$REGISTRY_PASSWORD" ]; then
            if [ "${{ inputs.ecr-login }}" != "true" ]; then
              echo "ghcr.io가 아닌 registry에 push하려면 REGISTRY_PASSWORD secret 또는 ecr-login이 필요합니다."
              exit 1
            fi
          fi

      - name: AWS 자격 증명 설정
        if: ${{ inputs.ecr-login }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ inputs.aws-region }}
          role-to-assume: ${{ inputs.aws-role-to-assume }}
          role-session-name: ${{ inputs.aws-role-session-name }}

      - name: Amazon ECR 로그인
        if: ${{ inputs.ecr-login }}
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ inputs.ecr-registries }}

      - name: ECR image-name 검증
        if: ${{ inputs.ecr-login && inputs.image-name == '' }}
        run: |
          echo "ecr-login을 사용할 때는 image-name에 ECR image URI를 명시해야 합니다."
          echo "예: 123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/my-app"
          exit 1

      - name: 코드 체크아웃
        uses: actions/checkout@v6

      - name: QEMU 설정
        if: ${{ inputs.setup-qemu }}
        uses: docker/setup-qemu-action@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v4

      - name: Registry 로그인
        if: ${{ (inputs.push || inputs.cache-type == 'registry') && !inputs.ecr-login }}
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.registry-username != '' && inputs.registry-username || github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD != '' && secrets.REGISTRY_PASSWORD || github.token }}

      - name: Docker 이미지 메타데이터 생성
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.image-name != '' && inputs.image-name || format('{0}/{1}', inputs.registry, github.repository) }}
          tags: ${{ inputs.tags }}
          labels: ${{ inputs.labels }}

      - name: Docker 이미지 빌드 및 푸시
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          target: ${{ inputs.target }}
          build-args: ${{ inputs.build-args }}
          secrets: ${{ inputs.build-secrets }}
          push: ${{ inputs.push }}
          pull: ${{ inputs.pull }}
          no-cache: ${{ inputs.no-cache }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: ${{ inputs.cache-type == 'gha' && format('type=gha,scope={0}', inputs.cache-scope) || inputs.cache-type == 'registry' && format('type=registry,ref={0}', inputs.registry-cache-ref) || '' }}
          cache-to: ${{ inputs.cache-type == 'gha' && format('type=gha,mode={0},scope={1},ignore-error=true', inputs.cache-mode, inputs.cache-scope) || inputs.cache-type == 'registry' && format('type=registry,ref={0},mode={1}', inputs.registry-cache-ref, inputs.cache-mode) || '' }}
          provenance: ${{ inputs.provenance }}
          sbom: ${{ inputs.sbom }}

      - name: Docker 이미지 출력 정리
        id: image
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail

          primary_tag="$(printf '%s\n' "$IMAGE_TAGS" | sed -n '1p')"
          image_reference="$primary_tag"

          if [ -n "$IMAGE_DIGEST" ] && [ -n "$primary_tag" ]; then
            image_base="${primary_tag%:*}"
            image_reference="${image_base}@${IMAGE_DIGEST}"
          fi

          echo "primary-tag=$primary_tag" >> "$GITHUB_OUTPUT"
          echo "reference=$image_reference" >> "$GITHUB_OUTPUT"
