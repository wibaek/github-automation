name: Node.js Build

on:
  workflow_call:
    inputs:
      node-version:
        description: "사용할 Node.js 버전"
        required: false
        type: string
        default: "22"

      # runs-on label 참고: https://docs.github.com/en/actions/reference/runners/github-hosted-runners
      runs-on:
        description: "실행할 러너 라벨"
        required: false
        type: string
        default: "ubuntu-latest"

      working-directory:
        description: "명령어를 실행할 작업 디렉터리"
        required: false
        type: string
        default: "."

      package-manager:
        description: "사용할 패키지 매니저. npm, pnpm, yarn 중 하나"
        required: false
        type: string
        default: "pnpm"

      pnpm-version:
        description: "pnpm을 사용할 때 적용할 pnpm 버전"
        required: false
        type: string
        default: "10"

      install-command:
        description: "의존성 설치 명령어. 비워두면 패키지 매니저별 기본 명령어 사용."
        required: false
        type: string
        default: ""

      lint-command:
        description: "린트 명령어. auto면 package-manager 기준으로 자동 실행, 빈 문자열이면 실행하지 않음."
        required: false
        type: string
        default: ""

      typecheck-command:
        description: "타입 검사 명령어. auto면 package-manager 기준으로 자동 실행, 빈 문자열이면 실행하지 않음."
        required: false
        type: string
        default: ""

      test-command:
        description: "테스트 명령어. auto면 package-manager 기준으로 자동 실행, 빈 문자열이면 실행하지 않음."
        required: false
        type: string
        default: ""

      build-command:
        description: "빌드 명령어. auto면 package-manager 기준으로 자동 실행, 빈 문자열이면 실행하지 않음."
        required: false
        type: string
        default: "auto"

      cache-dependency-path:
        description: "캐시 무효화 기준이 되는 lockfile 경로. 비워두면 setup-node 기본값 사용."
        required: false
        type: string
        default: ""

      concurrency-group:
        description: "동시 빌드를 제어할 concurrency group. 비워두면 레포와 브랜치 기준으로 자동 생성."
        required: false
        type: string
        default: ""

      cancel-in-progress:
        description: "같은 concurrency group의 이전 실행을 취소할지 여부"
        required: false
        type: boolean
        default: true

      timeout-minutes:
        description: "job 제한 시간"
        required: false
        type: number
        default: 30

permissions:
  contents: read

jobs:
  build:
    name: Node.js Build
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}

    concurrency:
      group: ${{ inputs.concurrency-group != '' && inputs.concurrency-group || format('node-build-{0}-{1}', github.repository, github.ref_name) }}
      cancel-in-progress: ${{ inputs.cancel-in-progress }}

    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    env:
      CI: "true"

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v6

      - name: 패키지 매니저 검증
        run: |
          case "${{ inputs.package-manager }}" in
            npm|pnpm|yarn)
              ;;
            *)
              echo "지원하지 않는 package-manager: ${{ inputs.package-manager }}"
              exit 1
              ;;
          esac

      - name: Corepack 활성화
        if: ${{ inputs.package-manager == 'pnpm' || inputs.package-manager == 'yarn' }}
        run: corepack enable

      - name: pnpm 준비
        if: ${{ inputs.package-manager == 'pnpm' }}
        run: corepack prepare "pnpm@${{ inputs.pnpm-version }}" --activate

      - name: Node 설정
        if: ${{ inputs.cache-dependency-path == '' }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Node 설정 및 캐시 기준 파일 지정
        if: ${{ inputs.cache-dependency-path != '' }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
          cache-dependency-path: ${{ inputs.cache-dependency-path }}

      - name: 의존성 설치
        if: ${{ inputs.install-command == '' }}
        run: |
          case "${{ inputs.package-manager }}" in
            npm)
              npm ci
              ;;
            pnpm)
              pnpm install --frozen-lockfile
              ;;
            yarn)
              yarn install --frozen-lockfile
              ;;
          esac

      - name: 사용자 지정 의존성 설치 명령어 실행
        if: ${{ inputs.install-command != '' }}
        run: ${{ inputs.install-command }}

      - name: 린트 자동 실행
        if: ${{ inputs.lint-command == 'auto' }}
        run: |
          case "${{ inputs.package-manager }}" in
            npm)
              npm run lint
              ;;
            pnpm)
              pnpm lint
              ;;
            yarn)
              yarn lint
              ;;
          esac

      - name: 사용자 지정 린트 실행
        if: ${{ inputs.lint-command != '' && inputs.lint-command != 'auto' }}
        run: ${{ inputs.lint-command }}

      - name: 타입 검사 자동 실행
        if: ${{ inputs.typecheck-command == 'auto' }}
        run: |
          case "${{ inputs.package-manager }}" in
            npm)
              npm run typecheck
              ;;
            pnpm)
              pnpm typecheck
              ;;
            yarn)
              yarn typecheck
              ;;
          esac

      - name: 사용자 지정 타입 검사 실행
        if: ${{ inputs.typecheck-command != '' && inputs.typecheck-command != 'auto' }}
        run: ${{ inputs.typecheck-command }}

      - name: 테스트 자동 실행
        if: ${{ inputs.test-command == 'auto' }}
        run: |
          case "${{ inputs.package-manager }}" in
            npm)
              npm test
              ;;
            pnpm)
              pnpm test
              ;;
            yarn)
              yarn test
              ;;
          esac

      - name: 사용자 지정 테스트 실행
        if: ${{ inputs.test-command != '' && inputs.test-command != 'auto' }}
        run: ${{ inputs.test-command }}

      - name: 빌드 자동 실행
        if: ${{ inputs.build-command == 'auto' }}
        run: |
          case "${{ inputs.package-manager }}" in
            npm)
              npm run build
              ;;
            pnpm)
              pnpm build
              ;;
            yarn)
              yarn build
              ;;
          esac

      - name: 사용자 지정 빌드 실행
        if: ${{ inputs.build-command != '' && inputs.build-command != 'auto' }}
        run: ${{ inputs.build-command }}
